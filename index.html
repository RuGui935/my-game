<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>无限回廊 | 副本列表</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Source+Code Pro:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="status-bar">
                <span>⚠️ 信号丢失</span>
                <span class="status-time">🕸️ 00:00:00</span>
                <span>🔋 诅咒</span>
            </div>
            <div class="player-info">
                <div class="player-avatar" onclick="location.href='pages/profile.html'"></div>
                <div class="player-stats" onclick="location.href='pages/profile.html'">
                    <div class="player-name">▶ 玩家「125」</div>
                    <div class="player-id">编号：011 | 理智值：43%</div>
                </div>
                <div class="settings-icon" onclick="location.href='pages/settings.html'">⚙️</div>
            </div>
        </header>

        <main class="main-content">
            <div class="resource-bar">
                <span class="resource-label">💎 理智碎片</span>
                <span class="resource-value" id="shardsValue">0</span>
                <span style="flex:1"></span>
                <span class="resource-label" style="cursor:pointer;" onclick="location.href='pages/backpack.html'">🎒 背包</span>
            </div>

            <div class="dungeon-list">
                <h3 class="section-title">📖 可选副本</h3>
                
                <div class="dungeon-item" data-dungeon="幽灵邮轮" data-desc="一艘失踪三十年的豪华邮轮突然出现在海面上，甲板上空无一人，但宴会厅里传来悠扬的音乐..." data-diff="★☆☆☆☆" data-url="dungeons/cruise.html">
                    <h4>幽灵邮轮</h4>
                    <p>难度：★☆☆☆☆ | 推荐等级：1 | 奖励：30理智碎片</p>
                </div>
                
                <div class="dungeon-item" data-dungeon="迷雾森林" data-desc="浓雾笼罩的古老森林，树木会移动，小径会改变方向。远处隐约可见一座小木屋..." data-diff="★★☆☆☆" data-url="dungeons/forest.html">
                    <h4>迷雾森林</h4>
                    <p>难度：★★☆☆☆ | 推荐等级：3 | 奖励：45理智碎片</p>
                </div>
                
                <div class="dungeon-item" data-dungeon="废弃矿井" data-desc="黑暗的矿道深处传来镐子敲击的声音，但矿井早已荒废多年。空气中弥漫着硫磺味..." data-diff="★★★☆☆" data-url="dungeons/mine.html">
                    <h4>废弃矿井</h4>
                    <p>难度：★★★☆☆ | 推荐等级：5 | 奖励：60理智碎片</p>
                </div>
                
                <div class="dungeon-item" data-dungeon="血月教堂" data-desc="血色的月光洒在哥特式教堂上，彩色玻璃上映着扭曲的影子，管风琴自动演奏着安魂曲..." data-diff="★★★★☆" data-url="dungeons/church.html">
                    <h4>血月教堂</h4>
                    <p>难度：★★★★☆ | 推荐等级：8 | 奖励：100理智碎片</p>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="location.href='pages/forum.html'">💬<span class="nav-label">论坛</span></div>
            <div class="nav-item active" onclick="location.href='index.html'">📖<span class="nav-label">副本</span></div>
            <div class="nav-item" onclick="location.href='pages/shop.html'">🛒<span class="nav-label">商城</span></div>
            <div class="nav-item" onclick="location.href='pages/lottery.html'">🎁<span class="nav-label">奖池</span></div>
            <div class="nav-item" onclick="location.href='pages/mail.html'">✉️<span class="nav-label">邮箱</span></div>
            <div class="nav-item" onclick="location.href='pages/friend.html'">👥<span class="nav-label">好友</span></div>
        </nav>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>进入副本</h3>
            <p id="modalDungeonDesc">确定要进入这个副本吗？</p>
            <div class="modal-buttons">
                <button id="modalConfirmBtn">进入</button>
                <button id="modalCancelBtn">取消</button>
            </div>
        </div>
    </div>

    <script>
        function updateShards() {
            let shards = localStorage.getItem('sanityShards');
            if (shards === null) {
                shards = 100;
                localStorage.setItem('sanityShards', shards);
            }
            document.getElementById('shardsValue').textContent = shards;
        }
        updateShards();

        const modal = document.getElementById('confirmModal');
        let selectedUrl = null;
        let selectedName = null;
        let selectedDesc = null;
        
        document.querySelectorAll('.dungeon-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                selectedUrl = item.getAttribute('data-url');
                selectedName = item.getAttribute('data-dungeon');
                selectedDesc = item.getAttribute('data-desc');
                document.getElementById('modalDungeonDesc').innerHTML = 
                    `📖 ${selectedName}<br><br>${selectedDesc}<br><br>确定要进入这个副本吗？`;
                modal.style.display = 'flex';
            });
        });
        
        document.getElementById('modalConfirmBtn').onclick = () => {
            if (selectedUrl) {
                localStorage.setItem('currentDungeonName', selectedName);
                window.location.href = selectedUrl;
            }
            modal.style.display = 'none';
        };
        
        document.getElementById('modalCancelBtn').onclick = () => {
            modal.style.display = 'none';
            selectedUrl = null;
        };
        
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.querySelectorAll('.status-time').forEach(el => {
                if (el) el.textContent = `🕸️ ${hours}:${minutes}:${seconds}`;
            });
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
