<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>无限回廊 | 恐怖副本</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Source+Code Pro:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 顶部状态栏与玩家信息 -->
        <header class="top-bar">
            <div class="status-bar">
                <span>⚠️ 信号丢失</span>
                <span>🕸️ 03:00</span>
                <span>🔋 诅咒</span>
            </div>
            <div class="player-info">
                <div class="player-avatar"></div>
                <div class="player-stats">
                    <div class="player-name">▶ 玩家「125」</div>
                    <div class="player-id">编号：011 | 理智值：43%</div>
                </div>
                <div class="settings-icon">⚙️</div>
            </div>
        </header>

        <!-- 主要内容：副本界面 -->
        <main class="main-content">
            <div class="dungeon-header">
                <h2 class="glitch-text">[ 当前副本 ]</h2>
                <div class="dungeon-name">废弃病栋 · 无限回廊</div>
            </div>
            <div class="dungeon-description">
                消毒水的气味混合着铁锈，走廊尽头的轮椅在缓缓转动。你感觉到有什么东西在注视着你...
            </div>
            <div class="dungeon-action">
                <button class="action-btn explore-btn">探索房间</button>
                <button class="action-btn escape-btn">逃离回廊</button>
            </div>
            <div class="event-log">
                <p>📜 事件记录：你踏入了病栋，手电筒开始闪烁。</p>
            </div>
        </main>

        <!-- 底部导航栏：点击跳转到对应的独立页面 -->
        <nav class="bottom-nav">
            <div class="nav-item" onclick="location.href='pages/forum.html'">
                <span class="nav-icon">💬</span>
                <span class="nav-label">论坛</span>
            </div>
            <div class="nav-item active" onclick="location.href='index.html'">
                <span class="nav-icon">📖</span>
                <span class="nav-label">副本</span>
            </div>
            <div class="nav-item" onclick="location.href='pages/shop.html'">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">商城</span>
            </div>
            <div class="nav-item" onclick="location.href='pages/lottery.html'">
                <span class="nav-icon">🎁</span>
                <span class="nav-label">奖池</span>
            </div>
            <div class="nav-item" onclick="location.href='pages/mail.html'">
                <span class="nav-icon">✉️</span>
                <span class="nav-label">邮箱</span>
            </div>
            <div class="nav-item" onclick="location.href='pages/friend.html'">
                <span class="nav-icon">👥</span>
                <span class="nav-label">好友</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
