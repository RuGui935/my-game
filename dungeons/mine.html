<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>废弃矿井 - 无限回廊</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Source+Code Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .story-text { background: rgba(0,0,0,0.6); padding: 16px; border-radius: 12px; margin-bottom: 20px; line-height: 1.6; font-size: 0.95rem; border-left: 3px solid #8a6a2a; }
        .choice-buttons { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .choice-btn { background: #1a1210; border: 1px solid #6a3a2a; padding: 12px 16px; border-radius: 12px; color: #dbbc8c; text-align: left; font-family: inherit; cursor: pointer; transition: all 0.2s; }
        .choice-btn:active { transform: scale(0.98); background: #2a1a1a; }
        .choice-btn.death-option { border-color: #8a2a2a; color: #ff8a6a; background: #2a0a0a; }
        .use-item-area { background: #0c0808; border-radius: 12px; padding: 12px; margin-top: 16px; border: 1px solid #4a2a2a; }
        .status-bars { display: flex; gap: 16px; margin-bottom: 16px; justify-content: space-between; }
        .status-item { flex: 1; background: #1a1210; padding: 8px; border-radius: 8px; text-align: center; }
        .status-value { font-size: 1.2rem; font-weight: bold; color: #e8a87c; }
        .reset-btn, .back-btn { background: #2a1a1a; border: 1px solid #6a3a2a; color: #dbbc8c; padding: 8px 16px; border-radius: 20px; margin-top: 10px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="status-bar"><span>⚠️ 信号丢失</span><span class="status-time">🕸️ 00:00:00</span><span>🔋 诅咒</span></div>
            <div class="player-info">
                <div class="player-avatar" onclick="location.href='../pages/profile.html'"></div>
                <div class="player-stats" onclick="location.href='../pages/profile.html'">
                    <div class="player-name">▶ 玩家「125」</div>
                    <div class="player-id">编号：011 | 理智值：43%</div>
                </div>
                <div class="settings-icon" onclick="location.href='../pages/settings.html'">⚙️</div>
            </div>
        </header>

        <main class="main-content">
            <div class="resource-bar">
                <span class="resource-label">💎 理智碎片</span><span class="resource-value" id="shardsValue">0</span>
                <span style="flex:1"></span>
                <span onclick="location.href='../pages/backpack.html'" style="cursor:pointer;">🎒 背包</span>
            </div>
            <div class="status-bars">
                <div class="status-item"><div class="status-label">❤️ 生命值</div><div class="status-value" id="hpValue">100</div></div>
                <div class="status-item"><div class="status-label">🧠 理智值</div><div class="status-value" id="sanityValue">100</div></div>
            </div>
            <div class="dungeon-header"><h2 class="glitch-text">[ 废弃矿井 ]</h2><div class="dungeon-name">难度 ★★★☆☆</div></div>
            <div class="story-text" id="storyText">加载中...</div>
            <div class="choice-buttons" id="choiceButtons"></div>
            <div class="use-item-area" id="useItemArea" style="display: none;"><div class="use-item-title">📦 使用道具</div><div class="item-buttons" id="itemButtons"></div></div>
            <button class="reset-btn" id="resetBtn" style="display: none;">🔄 重新开始</button>
            <button class="back-btn" id="backBtn" style="display: none;" onclick="location.href='../index.html'">← 返回</button>
        </main>
        <nav class="bottom-nav">
            <div class="nav-item" onclick="location.href='../pages/forum.html'">💬<span class="nav-label">论坛</span></div>
            <div class="nav-item" onclick="location.href='../index.html'">📖<span class="nav-label">副本</span></div>
            <div class="nav-item" onclick="location.href='../pages/shop.html'">🛒<span class="nav-label">商城</span></div>
            <div class="nav-item" onclick="location.href='../pages/lottery.html'">🎁<span class="nav-label">奖池</span></div>
            <div class="nav-item" onclick="location.href='../pages/mail.html'">✉️<span class="nav-label">邮箱</span></div>
            <div class="nav-item" onclick="location.href='../pages/friend.html'">👥<span class="nav-label">好友</span></div>
        </nav>
    </div>

    <script>
        let hp = 100, sanity = 100, gameActive = true;
        function addEventLog(msg) { let log = JSON.parse(localStorage.getItem('eventLog') || '[]'); log.unshift({ time: new Date().toLocaleTimeString(), message: msg }); if (log.length > 50) log.pop(); localStorage.setItem('eventLog', JSON.stringify(log)); }
        function updateStats() { document.getElementById('hpValue').textContent = Math.max(0, hp); document.getElementById('sanityValue').textContent = Math.max(0, sanity); document.getElementById('shardsValue').textContent = localStorage.getItem('sanityShards') || 100; }
        function applyEffects(e) { if (e.hp) { hp += e.hp; if (hp <= 0) gameActive = false; } if (e.sanity) { sanity += e.sanity; if (sanity <= 0) gameActive = false; } updateStats(); if (e.hp && e.hp < 0) addEventLog(`生命-${Math.abs(e.hp)}`); if (e.sanity && e.sanity < 0) addEventLog(`理智-${Math.abs(e.sanity)}`); }
        function useItem(n) { let b = JSON.parse(localStorage.getItem('backpack') || '[]'); let i = b.findIndex(x=>x.name===n); if(i==-1)return; if(n==='镇定剂'){hp=Math.min(100,hp+20);sanity=Math.min(100,sanity+15);addEventLog('使用镇定剂，生命+20，理智+15');alert('镇定剂生效');}else if(n==='手摇手电筒'){sanity=Math.min(100,sanity+10);addEventLog('手电筒照亮矿道，理智+10');alert('手电筒驱散黑暗');}else if(n==='生锈的十字架'){sanity=Math.min(100,sanity+15);addEventLog('十字架发出微光，理智+15');alert('十字架带来一丝安全感');}else{alert('无效');return;} b.splice(i,1); localStorage.setItem('backpack',JSON.stringify(b)); updateStats(); updateItemButtons();}
        function updateItemButtons() { let b = JSON.parse(localStorage.getItem('backpack') || '[]'); if(b.length===0){document.getElementById('useItemArea').style.display='none';return;} document.getElementById('useItemArea').style.display='block'; document.getElementById('itemButtons').innerHTML = b.map((item,idx)=>`<button class="item-btn" data-name="${item.name}">${item.icon||'📦'} ${item.name}</button>`).join(''); document.querySelectorAll('.item-btn').forEach(btn=>btn.addEventListener('click',()=>useItem(btn.getAttribute('data-name')))); }
        function handleDeath(m) { addEventLog(m); let s = JSON.parse(localStorage.getItem('playerStats')||'{"wins":0,"deaths":0,"completedDungeons":[]}'); s.deaths++; localStorage.setItem('playerStats',JSON.stringify(s)); document.getElementById('storyText').innerHTML=`<span style="color:#ff6b6b;">💀 死亡 💀</span><br><br>${m}`; document.getElementById('choiceButtons').innerHTML=''; document.getElementById('useItemArea').style.display='none'; document.getElementById('resetBtn').style.display='block'; document.getElementById('backBtn').style.display='block'; gameActive=false; }
        function handleWin() { let shards=parseInt(localStorage.getItem('sanityShards')||'100')+60; localStorage.setItem('sanityShards',shards); let s=JSON.parse(localStorage.getItem('playerStats')||'{"wins":0,"deaths":0,"completedDungeons":[]}'); s.wins++; if(!s.completedDungeons.includes('废弃矿井')) s.completedDungeons.push('废弃矿井'); localStorage.setItem('playerStats',JSON.stringify(s)); addEventLog('通关废弃矿井，获得60理智碎片'); document.getElementById('storyText').innerHTML=`<span style="color:#7ec850;">⭐ 通关！ ⭐</span><br><br>你逃出了废弃矿井！获得60理智碎片！`; document.getElementById('choiceButtons').innerHTML=''; document.getElementById('useItemArea').style.display='none'; document.getElementById('resetBtn').style.display='block'; document.getElementById('backBtn').style.display='block'; gameActive=false; updateStats(); }

        const scenes = {
            start: { text: "矿道的入口像一个张开的巨口，黑暗深不见底。你点燃了矿灯，踏入了这片被遗弃的地下世界。空气中弥漫着硫磺和腐朽的气味。脚下有碎石滚动的声音，你感觉有什么东西在暗处看着你。", choices: [{ text: "⬇️ 向深处走去", next: "deepMine", effects: {} }, { text: "🔍 检查入口周围", next: "entrance", effects: {} }] },
            entrance: { text: "墙上刻着一些符号，像是某种警告。地上有一把生锈的镐子和一具干尸。干尸的手指指着深处。", choices: [{ text: "⛏️ 拿起镐子", next: "getPickaxe", effects: { sanity: -10 } }, { text: "⬇️ 进入矿道", next: "deepMine", effects: {} }] },
            getPickaxe: { text: "你拿起镐子，干尸突然动了一下！你吓得后退，但它没有再动。", choices: [{ text: "进入矿道", next: "deepMine", effects: { hp: -5 } }] },
            deepMine: { text: "矿道越来越窄，头顶不断有碎石掉落。远处有镐子敲击的节奏声。你看到前方有一个岔路口。", choices: [{ text: "🔊 朝声音方向走去", next: "miner", effects: {} }, { text: "↩️ 走另一条路", next: "darkPath", effects: {} }, { text: "🔦 用矿灯照向深处", next: "lightDeep", effects: { sanity: -5 } }] },
            lightDeep: { text: "矿灯照到了一个佝偻的身影在黑暗中挖掘。他穿着几十年前的矿工服。听到你的声音，他缓缓转过头——那是一张骷髅般的面孔！", choices: [{ text: "⚔️ 用镐子攻击", next: "attackMiner", effects: {}, requiresItem: "生锈的镐子" }, { text: "🏃 转身逃跑", next: "runMine", effects: { sanity: -25 } }] },
            attackMiner: { text: "你挥舞镐子击中了矿工幽灵，他化作黑烟消散了。但诅咒也缠上了你。", choices: [{ text: "继续前进", next: "treasure", effects: { hp: -15 } }] },
            runMine: { text: "你疯狂地奔跑，在黑暗中摔了好几次。终于甩掉了那个东西，但你发现自己迷路了。", choices: [{ text: "继续", next: "lostMine", effects: { hp: -15, sanity: -10 } }] },
            lostMine: { text: "你在地下迷宫中完全迷失了方向。矿灯的电量开始不足。", choices: [{ text: "向左走", next: "deadEnd", effects: {} }, { text: "向右走", next: "deadEnd2", effects: {} }, { text: "向前走", next: "escapeMine", effects: {} }] },
            deadEnd: { text: "你走进了一个死胡同，突然地面塌陷！", choices: [], isDeath: true, deathMsg: "你掉进了深不见底的裂缝，永远消失在了矿井中。" },
            deadEnd2: { text: "你走进了矿工休息室，里面坐满了矿工的幽灵！他们全部转过头看着你。", choices: [], isDeath: true, deathMsg: "矿工幽灵们将你团团围住，你永远留在了矿井里。" },
            escapeMine: { text: "你幸运地找到了一个通风井，顺着绳子爬了上去，重见天日！", choices: [], isWin: true },
            darkPath: { text: "这条矿道更窄，空气更加稀薄。你听到前方有流水声。", choices: [{ text: "💧 朝流水声走去", next: "undergroundRiver", effects: {} }, { text: "↩️ 返回岔路口", next: "deepMine", effects: {} }] },
            undergroundRiver: { text: "你来到一条地下河边。水很清澈，但很深。对岸似乎有发光的东西。", choices: [{ text: "🏊 游泳过河", next: "swimRiver", effects: { hp: -10 } }, { text: "🔍 沿河岸走", next: "riverBank", effects: {} }] },
            swimRiver: { text: "你跳进河里，突然有什么东西抓住了你的脚！是水鬼！", choices: [{ text: "⚔️ 挣扎", next: "fightWaterGhost", effects: { hp: -30 } }, { text: "💊 丢出镇定剂", next: "calmWaterGhost", effects: {}, requiresItem: "镇定剂" }] },
            fightWaterGhost: { text: "你拼命挣扎，终于摆脱了水鬼，但已经筋疲力尽。", choices: [{ text: "爬到对岸", next: "treasure", effects: { hp: -10 } }] },
            calmWaterGhost: { text: "镇定剂在水中溶解，水鬼平静了下来，甚至帮你推到了对岸。", choices: [{ text: "探索对岸", next: "treasure", effects: {} }] },
            riverBank: { text: "你沿着河岸走，发现了一座木桥。但桥已经腐朽。", choices: [{ text: "🌉 过桥", next: "crossBridge", effects: { hp: -20 } }, { text: "继续沿河走", next: "longWalk", effects: { sanity: -10 } }] },
            crossBridge: { text: "你小心翼翼地过桥，桥在中间断裂，你抓住了一根绳子，荡到了对岸。", choices: [{ text: "继续", next: "treasure", effects: {} }] },
            longWalk: { text: "你走了很久，终于发现了一处可以涉水的地方。", choices: [{ text: "过河", next: "treasure", effects: { hp: -10 } }] },
            treasure: { text: "你发现了一个隐藏的矿室，里面堆积着一些发光的水晶和一块巨大的能量石。但同时，一只巨大的蝙蝠怪物出现了！", choices: [{ text: "⚔️ 战斗", next: "fightBat", effects: { hp: -40 } }, { text: "🏃 拿走能量石逃跑", next: "runWithGem", effects: { hp: -20 } }, { text: "💡 用手电筒照它", next: "flashlightBat", effects: {}, requiresItem: "手摇手电筒" }] },
            fightBat: { text: "你与蝙蝠怪物搏斗，身受重伤但最终击败了它。", choices: [{ text: "离开", next: "win", effects: {} }] },
            runWithGem: { text: "你抓起能量石拼命逃跑，蝙蝠在后面追你。你跳进一个矿车，顺着轨道冲出了矿井。", choices: [{ text: "离开", next: "win", effects: {} }] },
            flashlightBat: { text: "手电筒的强光让蝙蝠怪物尖叫着飞走了。你安全地拿走了能量石。", choices: [{ text: "离开", next: "win", effects: {} }] },
            miner: { text: "你走近那个身影，他突然转过身来——是一个活着的矿工！他说：'快走！这里被诅咒了！' 话还没说完，地面裂开，他被吞没了。", choices: [{ text: "🏃 朝反方向跑", next: "escapePath", effects: { sanity: -15 } }, { text: "🔍 查看裂缝", next: "lookCrack", effects: { sanity: -20 } }] },
            lookCrack: { text: "你往裂缝里看，一只巨大的眼睛正在看着你！", choices: [], isDeath: true, deathMsg: "裂缝中的怪物将你拉入了深渊。" },
            escapePath: { text: "你跑到了一个新区域，这里有一个电梯。", choices: [{ text: "⬆️ 坐电梯上去", next: "elevator", effects: {} }, { text: "继续探索", next: "deepMine", effects: {} }] },
            elevator: { text: "电梯缓缓上升，但中途卡住了。你用力撬开门，发现自己在一楼出口附近。", choices: [{ text: "🏃 跑向出口", next: "win", effects: { hp: -5 } }] },
            win: { text: "你冲出了矿井，阳光刺眼。回头望去，矿井入口已经消失了。你成功逃脱了！", choices: [], isWin: true }
        };

        function renderScene(id) {
            if (!gameActive) return;
            let s = scenes[id];
            if (!s) return;
            if (s.isWin) { handleWin(); return; }
            if (s.isDeath) { handleDeath(s.deathMsg); return; }
            if (hp <= 0) { handleDeath('你的生命值归零...'); return; }
            if (sanity <= 0) { handleDeath('你的理智彻底崩溃...'); return; }
            document.getElementById('storyText').innerHTML = s.text;
            if (s.choices && s.choices.length) {
                document.getElementById('choiceButtons').innerHTML = s.choices.map((c,i)=>`<button class="choice-btn ${c.effects?.hp && c.effects.hp <= -30 ? 'death-option' : ''}" data-choice="${i}">${c.text}${c.requiresItem?` (需要:${c.requiresItem})`:''}</button>`).join('');
                document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if (!gameActive) return;  // ← 添加这一行
        let idx = parseInt(btn.getAttribute('data-choice'));
        let choice = scene.choices[idx];
        if (choice.requiresItem) {
            let backpack = JSON.parse(localStorage.getItem('backpack') || '[]');
            if (!backpack.some(i => i.name === choice.requiresItem)) {
                alert(`需要 ${choice.requiresItem} 才能选择这个选项！`);
                return;
            }
        }
        if (choice.effects) applyEffects(choice.effects);
        // 应用效果后再次检查生命/理智
        if (hp <= 0) { handleDeath('你的生命值归零...'); return; }
        if (sanity <= 0) { handleDeath('你的理智彻底崩溃...'); return; }
        if (choice.next) renderScene(choice.next);
    });
});
            } else document.getElementById('choiceButtons').innerHTML = '';
            updateItemButtons();
        }
        function resetGame() { hp=100; sanity=100; gameActive=true; updateStats(); renderScene('start'); document.getElementById('resetBtn').style.display='none'; document.getElementById('backBtn').style.display='none'; }
        renderScene('start'); updateStats(); document.getElementById('resetBtn').addEventListener('click', resetGame);
        setInterval(()=>{let n=new Date(); document.querySelectorAll('.status-time').forEach(el=>el.textContent=`🕸️ ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`);},1000);
    </script>
</body>
</html>
