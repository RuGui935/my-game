<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>血月教堂 - 无限回廊</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Source+Code Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .story-text { background: rgba(0,0,0,0.7); padding: 18px; border-radius: 12px; margin-bottom: 20px; line-height: 1.7; font-size: 0.95rem; border-left: 4px solid #c0392b; }
        .choice-buttons { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .choice-btn { background: #1a1210; border: 1px solid #8a2a2a; padding: 14px 16px; border-radius: 12px; color: #dbbc8c; text-align: left; font-family: inherit; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .choice-btn:active { transform: scale(0.98); background: #2a1a1a; }
        .choice-btn.death-option { border-color: #c0392b; color: #e74c3c; background: #2a0a0a; }
        .choice-btn.win-option { border-color: #27ae60; color: #2ecc71; }
        .status-bars { display: flex; gap: 16px; margin-bottom: 16px; justify-content: space-between; }
        .status-item { flex: 1; background: #1a1210; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #4a2a2a; }
        .status-label { font-size: 0.7rem; color: #7a5a4a; }
        .status-value { font-size: 1.3rem; font-weight: bold; color: #e8a87c; }
        .use-item-area { background: #0c0808; border-radius: 12px; padding: 12px; margin-top: 16px; border: 1px solid #8a2a2a; }
        .use-item-title { font-size: 0.8rem; color: #c0392b; margin-bottom: 8px; }
        .item-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
        .item-btn { background: #2a1a1a; border: 1px solid #8a2a2a; padding: 8px 14px; border-radius: 20px; font-size: 0.75rem; color: #dbbc8c; cursor: pointer; }
        .reset-btn, .back-btn { background: #2a1a1a; border: 1px solid #8a2a2a; color: #dbbc8c; padding: 10px 16px; border-radius: 20px; margin-top: 10px; cursor: pointer; width: 100%; }
        .resource-bar { display: flex; justify-content: space-between; align-items: center; background: #1a1210; padding: 10px 16px; border-radius: 30px; margin-bottom: 20px; border: 1px solid #8a2a2a; }
        .dungeon-header { margin-bottom: 20px; border-left: 4px solid #c0392b; padding-left: 12px; }
        .glitch-text { font-family: 'Creepster', cursive; font-size: 1.2rem; color: #c0392b; text-shadow: 1px 1px 0 #3a1a1a; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="status-bar"><span>⚠️ 信号丢失</span><span class="status-time">🕸️ 00:00:00</span><span>🔋 诅咒</span></div>
            <div class="player-info">
                <div class="player-avatar" onclick="location.href='../pages/profile.html'"></div>
                <div class="player-stats" onclick="location.href='../pages/profile.html'">
                    <div class="player-name">▶ 玩家「125」</div>
                    <div class="player-id">编号：011 | 理智值：43%</div>
                </div>
                <div class="settings-icon" onclick="location.href='../pages/settings.html'">⚙️</div>
            </div>
        </header>

        <main class="main-content">
            <div class="resource-bar">
                <span class="resource-label">💎 理智碎片</span>
                <span class="resource-value" id="shardsValue">0</span>
                <span style="flex:1"></span>
                <span class="resource-label" style="cursor:pointer;" onclick="location.href='../pages/backpack.html'">🎒 背包</span>
            </div>

            <div class="status-bars">
                <div class="status-item"><div class="status-label">❤️ 生命值</div><div class="status-value" id="hpValue">100</div></div>
                <div class="status-item"><div class="status-label">🧠 理智值</div><div class="status-value" id="sanityValue">100</div></div>
                <div class="status-item"><div class="status-label">✨ 圣光祝福</div><div class="status-value" id="blessValue">0</div></div>
            </div>

            <div class="dungeon-header">
                <h2 class="glitch-text">[ 血月教堂 ]</h2>
                <div class="dungeon-name">难度 ★★★★☆ | 极其危险</div>
            </div>

            <div class="story-text" id="storyText">加载中...</div>
            <div class="choice-buttons" id="choiceButtons"></div>

            <div class="use-item-area" id="useItemArea" style="display: none;">
                <div class="use-item-title">📦 使用道具</div>
                <div class="item-buttons" id="itemButtons"></div>
            </div>

            <button class="reset-btn" id="resetBtn" style="display: none;">🔄 重新挑战血月教堂</button>
            <button class="back-btn" id="backBtn" style="display: none;" onclick="location.href='../index.html'">← 返回副本列表</button>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="location.href='../pages/forum.html'">💬<span class="nav-label">论坛</span></div>
            <div class="nav-item" onclick="location.href='../index.html'">📖<span class="nav-label">副本</span></div>
            <div class="nav-item" onclick="location.href='../pages/shop.html'">🛒<span class="nav-label">商城</span></div>
            <div class="nav-item" onclick="location.href='../pages/lottery.html'">🎁<span class="nav-label">奖池</span></div>
            <div class="nav-item" onclick="location.href='../pages/mail.html'">✉️<span class="nav-label">邮箱</span></div>
            <div class="nav-item" onclick="location.href='../pages/friend.html'">👥<span class="nav-label">好友</span></div>
        </nav>
    </div>

    <script>
        // ========== 游戏状态 ==========
        let hp = 100;
        let sanity = 100;
        let blessing = 0;
        let gameActive = true;
        
        function addEventLog(msg) {
            let log = JSON.parse(localStorage.getItem('eventLog') || '[]');
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            log.unshift({ time: timeStr, message: msg });
            if (log.length > 50) log.pop();
            localStorage.setItem('eventLog', JSON.stringify(log));
        }
        
        function updateStats() {
            document.getElementById('hpValue').textContent = Math.max(0, hp);
            document.getElementById('sanityValue').textContent = Math.max(0, sanity);
            document.getElementById('blessValue').textContent = blessing;
            let shards = localStorage.getItem('sanityShards') || 100;
            document.getElementById('shardsValue').textContent = shards;
        }
        
        function applyEffects(effects) {
            if (!gameActive) return;
            if (effects.hp) {
                hp += effects.hp;
                if (hp <= 0) { gameActive = false; handleDeath('你的生命值归零，倒在了教堂的血色地板上...'); return; }
                if (effects.hp < 0) addEventLog(`生命-${Math.abs(effects.hp)}`);
            }
            if (effects.sanity) {
                sanity += effects.sanity;
                if (sanity <= 0) { gameActive = false; handleDeath('你的理智彻底崩溃，永远困在了教堂的诅咒中...'); return; }
                if (effects.sanity < 0) addEventLog(`理智-${Math.abs(effects.sanity)}`);
            }
            if (effects.blessing) {
                blessing += effects.blessing;
                if (effects.blessing > 0) addEventLog(`圣光祝福+${effects.blessing}`);
            }
            updateStats();
        }
        
        function updateItemButtons() {
            let backpack = JSON.parse(localStorage.getItem('backpack') || '[]');
            if (backpack.length === 0) {
                document.getElementById('useItemArea').style.display = 'none';
                return;
            }
            document.getElementById('useItemArea').style.display = 'block';
            document.getElementById('itemButtons').innerHTML = backpack.map((item, idx) => 
                `<button class="item-btn" data-item-index="${idx}" data-item-name="${item.name}">${item.icon || '📦'} ${item.name}</button>`
            ).join('');
            document.querySelectorAll('.item-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!gameActive) return;
                    useItem(btn.getAttribute('data-item-name'));
                });
            });
        }
        
        function useItem(itemName) {
            let backpack = JSON.parse(localStorage.getItem('backpack') || '[]');
            let idx = backpack.findIndex(i => i.name === itemName);
            if (idx === -1) return;
            
            if (itemName === '镇定剂') {
                hp = Math.min(100, hp + 20);
                sanity = Math.min(100, sanity + 15);
                addEventLog('使用镇定剂，生命+20，理智+15');
                alert('镇定剂让你冷静下来');
            } else if (itemName === '手摇手电筒') {
                sanity = Math.min(100, sanity + 10);
                addEventLog('手电筒照亮阴影，理智+10');
                alert('手电筒驱散了一些黑暗');
            } else if (itemName === '生锈的十字架') {
                blessing = Math.min(3, blessing + 1);
                addEventLog('十字架发光，圣光祝福+1');
                alert('十字架发出微弱的光芒');
            } else {
                alert('这个道具在这里没有效果');
                return;
            }
            
            backpack.splice(idx, 1);
            localStorage.setItem('backpack', JSON.stringify(backpack));
            updateStats();
            updateItemButtons();
        }
        
        function handleDeath(msg) {
            if (!gameActive) return;
            gameActive = false;
            addEventLog(msg);
            let stats = JSON.parse(localStorage.getItem('playerStats') || '{"wins":0,"deaths":0,"completedDungeons":[]}');
            stats.deaths++;
            localStorage.setItem('playerStats', JSON.stringify(stats));
            document.getElementById('storyText').innerHTML = `<span style="color:#e74c3c; font-size:1.2rem;">💀 死亡 💀</span><br><br>${msg}`;
            document.getElementById('choiceButtons').innerHTML = '';
            document.getElementById('useItemArea').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            updateStats();
        }
        
        function handleWin() {
            if (!gameActive) return;
            gameActive = false;
            let reward = 100 + blessing * 10;
            let shards = parseInt(localStorage.getItem('sanityShards') || '100') + reward;
            localStorage.setItem('sanityShards', shards);
            let stats = JSON.parse(localStorage.getItem('playerStats') || '{"wins":0,"deaths":0,"completedDungeons":[]}');
            stats.wins++;
            if (!stats.completedDungeons.includes('血月教堂')) stats.completedDungeons.push('血月教堂');
            localStorage.setItem('playerStats', JSON.stringify(stats));
            addEventLog(`通关血月教堂，获得${reward}理智碎片`);
            document.getElementById('storyText').innerHTML = `<span style="color:#2ecc71; font-size:1.2rem;">⭐ 通关！ ⭐</span><br><br>你净化了血月教堂！获得了 ${reward} 理智碎片！`;
            document.getElementById('choiceButtons').innerHTML = '';
            document.getElementById('useItemArea').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            updateStats();
        }
        
        // ========== 剧情场景 ==========
        const scenes = {
            start: {
                text: "🌕 血月高悬在教堂尖顶上方，将一切都染成了暗红色。教堂的大门敞开，里面传来管风琴诡异的乐声。彩绘玻璃上映着扭曲的影子，像是在痛苦地挣扎。你感到一股无形的力量在召唤你进去，同时又有一种强烈的警告：进去就再也出不来了...",
                choices: [
                    { text: "🚪 推开大门进入教堂", next: "enterChurch", effects: { sanity: -5 } },
                    { text: "🔍 先在教堂外调查", next: "outside", effects: {} },
                    { text: "🏃 转身离开", next: "leave", effects: {} }

                text: "你转身要走，但教堂的大门突然自己打开了。一股无形的力量将你吸了进去！",
                choices: [],
                isDeath: true,
                deathMsg: "你试图逃跑，但教堂的诅咒不允许任何人离开。"
            },
            outside: {
                text: "你绕着教堂走了一圈，发现后院有一片墓地。墓碑上的名字都在血月下闪烁着诡异的光芒。你看到一座墓碑上刻着你的名字和今天的日期！心跳骤然加速。",
                choices: [
                    { text: "😨 冲进教堂", next: "enterChurch", effects: { sanity: -15 } },

                ]
            },

                text: "你闭上眼睛深呼吸，再次睁开时，墓碑上的字消失了。但你感到一阵寒意，决定进入教堂。",

                    { text: "进入教堂", next: "enterChurch", effects: { sanity: -5 } }
                ]
            },
            enterChurch: {

                choices: [

                text: "你高举十字架，圣光照耀着整个墓穴。黑眼圣女尖叫着化为光芒消散。封印完全稳定了！",
                choices: [
                    { text: "✨ 获得胜利", next: "win", effects: { blessing: 3 } }
                ]
            },
            cryptExit: {
                text: "你找到了一个出口，爬出了墓穴，发现自己站在教堂后院。",
                choices: [
                    { text: "重新进入教堂", next: "enterChurch", effects: {} }
                ]
            },
            win: {
                text: "圣物的光芒驱散了教堂的诅咒！血月消失了，变成了正常的月亮。教堂恢复了圣洁。你成功通关了血月教堂！",
                choices: [],
                isWin: true
            }
        };
        
        // ========== 渲染函数 ==========
        function renderScene(id) {
            console.log("渲染场景:", id);
            if (!gameActive) return;
            if (hp <= 0) { handleDeath('你的生命值归零...'); return; }
            if (sanity <= 0) { handleDeath('你的理智彻底崩溃...'); return; }
            
            const scene = scenes[id];
            if (!scene) {
                console.error("场景不存在:", id);
                document.getElementById('storyText').innerHTML = '<span style="color:#e74c3c;">错误：场景加载失败，请点击重置按钮</span>';
                return;
            }
            
            if (scene.isWin) { handleWin(); return; }
            if (scene.isDeath) { handleDeath(scene.deathMsg); return; }
            
            document.getElementById('storyText').innerHTML = scene.text;
            
            if (scene.choices && scene.choices.length > 0) {
                let html = '';
                for (let i = 0; i < scene.choices.length; i++) {
                    const c = scene.choices[i];
                    let cls = '';
                    if (c.next === 'win') cls = 'win-option';
                    else if (c.effects && c.effects.hp && c.effects.hp <= -20) cls = 'death-option';
                    let req = c.requiresItem ? ` (需要:${c.requiresItem})` : '';
                    html += `<button class="choice-btn ${cls}" data-choice="${i}">${c.text}${req}</button>`;
                }
                document.getElementById('choiceButtons').innerHTML = html;
                
                // 绑定事件
                document.querySelectorAll('#choiceButtons .choice-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (!gameActive) return;
                        const idx = parseInt(btn.getAttribute('data-choice'));
                        const choice = scene.choices[idx];
                        if (!choice) return;
                        
                        if (choice.requiresItem) {
                            const backpack = JSON.parse(localStorage.getItem('backpack') || '[]');
                            if (!backpack.some(i => i.name === choice.requiresItem)) {
                                alert(`需要 ${choice.requiresItem}`);
                                return;
                            }
                        }
                        
                        if (choice.effects) applyEffects(choice.effects);
                        if (!gameActive) return;
                        if (choice.next) renderScene(choice.next);
                    });
                });
            } else {
                document.getElementById('choiceButtons').innerHTML = '';
            }
            updateItemButtons();
        }
        
        function resetGame() {
            hp = 100;
            sanity = 100;
            blessing = 0;
            gameActive = true;
            updateStats();
            renderScene('start');
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            addEventLog('重新开始挑战血月教堂');
        }
        
        // 初始化
        console.log("初始化教堂副本");
        renderScene('start');
        updateStats();
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        
        setInterval(() => {
            let now = new Date();
            let timeStr = `🕸️ ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            document.querySelectorAll('.status-time').forEach(el => el.textContent = timeStr);
        }, 1000);
    </script>
</body>
</html>
