<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>奖池 - 无限回廊</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="status-bar">
                <span>⚠️ 信号丢失</span>
                <span>🕸️ 03:00</span>
                <span>🔋 诅咒</span>
            </div>
            <div class="player-info">
                <div class="player-avatar"></div>
                <div class="player-stats">
                    <div class="player-name">▶ 玩家「125」</div>
                    <div class="player-id">编号：011 | 理智值：43%</div>
                </div>
                <div class="settings-icon">⚙️</div>
            </div>
        </header>

        <main class="main-content">
            <div class="list-container">
                <h3 class="section-title">🎲 命运的轮盘</h3>
                <p class="lottery-desc">每次抽奖消耗 5 理智碎片，获得随机物品或诅咒。</p>
                <div class="rewards-list">
                    <ul class="item-list">
                        <li><span>⚰️ 生锈的护符</span><span class="price">★★☆☆☆</span></li>
                        <li><span>🕸️ 诅咒绷带</span><span class="price">★★☆☆☆</span></li>
                        <li><span>🔮 灵视药水</span><span class="price">★★★☆☆</span></li>
                        <li><span>📜 残缺的笔记</span><span class="price">★★☆☆☆</span></li>
                        <li><span>🧠 理智碎片 x5</span><span class="price">★★★☆☆</span></li>
                        <li><span>👁️ 邪神凝视</span><span class="price">★★★★☆</span></li>
                    </ul>
                </div>
                <button class="action-btn lottery-spin">🎲 转动轮盘</button>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item" data-page="forum">💬<span class="nav-label">论坛</span></div>
            <div class="nav-item" data-page="dungeon">📖<span class="nav-label">副本</span></div>
            <div class="nav-item" data-page="shop">🛒<span class="nav-label">商城</span></div>
            <div class="nav-item" data-page="lottery">🎁<span class="nav-label">奖池</span></div>
            <div class="nav-item" data-page="mail">✉️<span class="nav-label">邮箱</span></div>
            <div class="nav-item" data-page="friend">👥<span class="nav-label">好友</span></div>
        </nav>
    </div>
    <script src="../script.js"></script>
</body>
</html>
