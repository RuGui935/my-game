<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>副本探索 - 无限回廊</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Source+Code Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 副本专用样式 */
        .story-text {
            background: rgba(0,0,0,0.6);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            border-left: 3px solid #9c4a3a;
        }
        .choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .choice-btn {
            background: #1a1210;
            border: 1px solid #6a3a2a;
            padding: 12px 16px;
            border-radius: 12px;
            color: #dbbc8c;
            text-align: left;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        .choice-btn:active {
            transform: scale(0.98);
            background: #2a1a1a;
        }
        .use-item-area {
            background: #0c0808;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            border: 1px solid #4a2a2a;
        }
        .use-item-title {
            font-size: 0.8rem;
            color: #7a5a4a;
            margin-bottom: 8px;
        }
        .item-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .item-btn {
            background: #2a1a1a;
            border: 1px solid #6a3a2a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #dbbc8c;
            cursor: pointer;
        }
        .item-btn:active {
            transform: scale(0.95);
        }
        .status-bars {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            justify-content: space-between;
        }
        .status-item {
            flex: 1;
            background: #1a1210;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }
        .status-label {
            font-size: 0.7rem;
            color: #7a5a4a;
        }
        .status-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e8a87c;
        }
        .reset-btn {
            background: #2a1a1a;
            border: 1px solid #6a3a2a;
            color: #dbbc8c;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 16px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="status-bar">
                <span>⚠️ 信号丢失</span>
                <span class="status-time">🕸️ 00:00:00</span>
                <span>🔋 诅咒</span>
            </div>
            <div class="player-info">
                <div class="player-avatar" onclick="location.href='profile.html'"></div>
                <div class="player-stats" onclick="location.href='profile.html'">
                    <div class="player-name">▶ 玩家「125」</div>
                    <div class="player-id">编号：011 | 理智值：43%</div>
                </div>
                <div class="settings-icon" onclick="location.href='settings.html'">⚙️</div>
            </div>
        </header>

        <main class="main-content">
            <div class="resource-bar">
                <span class="resource-label">💎 理智碎片</span>
                <span class="resource-value" id="shardsValue">0</span>
                <span style="flex:1"></span>
                <span class="resource-label" style="cursor:pointer;" onclick="location.href='backpack.html'">🎒 背包</span>
            </div>

            <!-- 状态栏 -->
            <div class="status-bars">
                <div class="status-item">
                    <div class="status-label">❤️ 生命值</div>
                    <div class="status-value" id="hpValue">100</div>
                </div>
                <div class="status-item">
                    <div class="status-label">🧠 理智值</div>
                    <div class="status-value" id="sanityValue">100</div>
                </div>
            </div>

            <!-- 副本标题 -->
            <div class="dungeon-header">
                <h2 class="glitch-text">[ 当前副本 ]</h2>
                <div class="dungeon-name" id="currentDungeonName">加载中...</div>
            </div>

            <!-- 故事/场景描述 -->
            <div class="story-text" id="storyText">
                加载中...
            </div>

            <!-- 选项按钮区域 -->
            <div class="choice-buttons" id="choiceButtons">
                <!-- 动态生成选项 -->
            </div>

            <!-- 使用道具区域 -->
            <div class="use-item-area" id="useItemArea" style="display: none;">
                <div class="use-item-title">📦 使用道具（当前场景可用）</div>
                <div class="item-buttons" id="itemButtons">
                    <!-- 动态生成道具按钮 -->
                </div>
            </div>

            <button class="reset-btn" id="resetBtn" style="display: none;">🔄 重新开始副本</button>
            <button class="back-btn" id="backBtn" style="display: none;" onclick="location.href='../index.html'">← 返回副本列表</button>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="location.href='forum.html'">💬<span class="nav-label">论坛</span></div>
            <div class="nav-item" onclick="location.href='../index.html'">📖<span class="nav-label">副本</span></div>
            <div class="nav-item" onclick="location.href='shop.html'">🛒<span class="nav-label">商城</span></div>
            <div class="nav-item" onclick="location.href='lottery.html'">🎁<span class="nav-label">奖池</span></div>
            <div class="nav-item" onclick="location.href='mail.html'">✉️<span class="nav-label">邮箱</span></div>
            <div class="nav-item" onclick="location.href='friend.html'">👥<span class="nav-label">好友</span></div>
        </nav>
    </div>

    <script>
        // ========== 副本数据定义 ==========
        
        // 幽灵邮轮副本剧情
        const cruiseStory = {
            start: {

                choices: [
                    { text: "🔍 登船探索", next: "cabin", effects: {} },
                    { text: "🏃 转身离开", next: "leave", effects: {} }
                ]
            },
            cabin: {
                text: "你走进了一间头等舱套房。房间布置典雅，梳妆台上的香水瓶还在散发着香气。衣柜里挂着整齐的晚礼服，仿佛主人只是暂时离开。突然，你听到了隔壁房间传来啜泣声。",
                choices: [
                    { text: "🚪 推开相邻房间的门", next: "neighbor", effects: {} },
                    { text: "🔍 搜查这个房间", next: "search", effects: {} },
                    { text: "🏃 离开房间去走廊", next: "corridor", effects: {} }

                text: "你推开门，看到一个穿着白色长裙的女人背对着你坐在床边啜泣。当你靠近时，她突然转过头——没有脸，只有一片空白。她向你扑来！",
                choices: [
                    { text: "⚔️ 奋力抵抗", next: "fightGhost", effects: { hp: -20 } },

                    { text: "继续探索", next: "corridor", effects: {} }
                ]
            },
            search: {
                text: "你在梳妆台抽屉里发现了一本日记。最后一页写着：'他不让我下船，永远不让我离开...' 你感到一阵眩晕，似乎有什么东西在看着你。",
                choices: [
                    { text: "继续探索", next: "corridor", effects: { sanity: -5 } }
                ]
            },
            corridor: {
                text: "你走在空荡荡的走廊上，红色的地毯上没有任何脚印。墙上的油画中，人物的眼睛似乎在追随你的移动。前方传来悠扬的音乐声。",
                choices: [
                    { text: "🎭 前往宴会厅", next: "ballroom", effects: {} },
                    { text: "⬆️ 上楼梯去甲板", next: "deck", effects: {} },
                    { text: "⬇️ 下楼梯去引擎室", next: "engine", effects: {} }
                ]
            },
            ballroom: {
                text: "宴会厅里灯火通明，留声机自动播放着华尔兹。空无一人的舞池中，可以看到鞋印在自动移动，仿佛有无形的舞者在跳舞。突然，音乐停止，所有的灯同时熄灭！",
                choices: [
                    { text: "🕯️ 点亮随身携带的手电", next: "lightOn", effects: {}, requiresItem: "手摇手电筒" },
                    { text: "🔦 用手机照明", next: "lightPhone", effects: { sanity: -10 } },
                    { text: "🏃 摸黑逃跑", next: "escapeDark", effects: { hp: -15, sanity: -15 } }
                ]
            },
            lightOn: {
                text: "手电筒照亮了四周！你看到舞池中央站着一群穿着华丽礼服的人，他们的脸上都带着面具。他们向你伸出手，似乎在邀请你共舞。",
                choices: [
                    { text: "💃 接受邀请跳舞", next: "dance", effects: {} },
                    { text: "🚪 拒绝并快步离开", next: "corridor", effects: {} }
                ]
            },
            dance: {
                text: "你牵起一只冰凉的手，开始跳舞。音乐越来越快，你感觉头晕目眩。当你停下来时，发现自己已经回到了船头甲板。一个声音在你耳边响起：'你通过了考验，可以离开了。'",
                choices: [
                    { text: "✅ 通关！离开邮轮", next: "win", effects: {} }
                ]
            },
            lightPhone: {
                text: "手机微弱的灯光照亮了周围，但你总觉得有什么东西在阴影中窥视。你的理智开始动摇。",
                choices: [
                    { text: "继续探索", next: "ballroom", effects: {} }
                ]
            },
            escapeDark: {
                text: "你在黑暗中摸索，不小心撞到了桌角，然后踩到了什么黏糊糊的东西。恐惧吞噬着你的理智。",
                choices: [
                    { text: "继续", next: "corridor", effects: {} }
                ]
            },
            deck: {
                text: "你来到甲板上，海风带着咸腥味。救生艇的绳索在风中摆动，发出嘎吱嘎吱的声音。海面上雾气弥漫，看不到任何陆地。",
                choices: [
                    { text: "🔭 看向海面", next: "ocean", effects: {} },
                    { text: "⬇️ 返回走廊", next: "corridor", effects: {} }
                ]
            },
            ocean: {
                text: "你凝视着漆黑的海面，突然看到海水中浮起一张张惨白的面孔，正睁大眼睛看着你！",

                    { text: "😱 转身逃跑", next: "corridor", effects: { sanity: -15 } },
                    { text: "🧘 闭上眼睛冷静", next: "calmDown", effects: {} }
                ]
            },
            calmDown: {
                text: "你深呼吸，再次睁眼时，海面上的面孔消失了。也许是幻觉...",

                ]
            },
            engine: {
                text: "引擎室温度很高，巨大的机器仍在运转。锅炉的火光映在墙壁上，影子在跳动。一个维修工人的工具箱还开着，里面有一把应急钥匙。",
                choices: [
                    { text: "🔑 拿走钥匙", next: "getKey", effects: {} },
                    { text: "⬆️ 返回上面", next: "corridor", effects: {} }
                ]
            },
            getKey: {
                text: "你获得了应急钥匙。这也许能打开船长室的门。",
                choices: [
                    { text: "返回走廊", next: "corridor", effects: {} }
                ]
            },
            leave: {
                text: "你转身离开，身后的邮轮消失在浓雾中。副本挑战失败，下次再尝试吧。",
                choices: [],
                isDeath: true,
                deathMessage: "你放弃了探索，离开了邮轮。"
            },
            win: {
                text: "⭐ 恭喜！你成功通过了幽灵邮轮的考验，获得了丰厚奖励！",
                choices: [],
                isWin: true,
                winMessage: "你获得了 30 理智碎片和稀有道具！"
            }
        };

        // 迷雾森林副本剧情
        const forestStory = {
            start: {
                text: "浓雾笼罩着古老的森林，参天大树的枝叶遮蔽了天空。你只能依靠偶尔透下的月光辨别方向。远处，一座小木屋的轮廓若隐若现...",
                choices: [
                    { text: "🏠 前往小木屋", next: "cabin", effects: {} },
                    { text: "🌲 深入树林", next: "deepForest", effects: {} },
                    { text: "🏃 寻找出口", next: "lost", effects: {} }
                ]
            },
            cabin: {
                text: "小木屋的木门虚掩着。你推开门，看到屋内有一个壁炉，柴火还在燃烧。桌上摆着一碗热气腾腾的汤，但周围没有人影。",
                choices: [
                    { text: "🍲 喝汤", next: "drinkSoup", effects: {} },
                    { text: "🔍 搜查屋子", next: "searchCabin", effects: {} },
                    { text: "🚪 离开小木屋", next: "start", effects: {} }
                ]
            },
            drinkSoup: {
                text: "你喝了一口汤，感觉身体暖和了起来。但头开始发晕，眼前出现了重影...",
                choices: [
                    { text: "💊 服用镇定剂", next: "curePoison", effects: {}, requiresItem: "镇定剂" },
                    { text: "😵 硬撑", next: "poisoned", effects: { hp: -15, sanity: -10 } }
                ]
            },
            curePoison: {
                text: "镇定剂发挥了作用，你清醒了过来。你发现汤里有毒，幸好及时解除了。",

                    { text: "继续探索", next: "searchCabin", effects: {} }
                ]
            },
            poisoned: {
                text: "你的身体越来越虚弱，毒性正在蔓延。",
                choices: [
                    { text: "继续", next: "searchCabin", effects: {} }
                ]
            },
            searchCabin: {
                text: "你在床底下发现了一本古老的日记。里面记载着森林的诅咒和解除方法。",

                    { text: "继续探索", next: "start", effects: { sanity: +5 } }

            },

            creature: {

            },
            helpDeer: {
                text: "你费了很大力气打开了捕兽夹。鹿站起来，朝你点了点头，然后消失在树林中。你感觉有什么好事会发生。",
                choices: [
                    { text: "继续探索", next: "start", effects: { sanity: +10 } }

                text: "你在森林中迷失了方向，天色越来越暗。你听到了狼嚎声。",

            },
            wolves: {
                text: "你遇到了狼群！几双发光的眼睛在黑暗中盯着你。",

            fightWolves: {
                text: "你勉强击退了狼群，但身受重伤。你找到了回程的路。",

            wait: {

                winMessage: "你获得了 25 理智碎片和森林护符！"

        };

        // 废弃矿井副本剧情
        const mineStory = {
            start: {
                text: "矿道的入口像一个张开的巨口，黑暗深不见底。你点燃了随身携带的矿灯，踏入了这片被遗弃的地下世界。空气中弥漫着硫磺和腐朽的气味。",
                choices: [
                    { text: "⬇️ 向深处走去", next: "deepMine", effects: {} },
                    { text: "🔍 检查入口周围", next: "entrance", effects: {} }

            entrance: {
                text: "你发现墙上刻着一些符号，像是某种警告。地上有一把生锈的镐子。",

            getPickaxe: {
                text: "你获得了生锈的镐子，也许可以用来防身或开路。",
                choices: [
                    { text: "进入矿道", next: "deepMine", effects: {} }

            },
            deepMine: {

                    { text: "🔊 朝声音方向走去", next: "miner", effects: {} },
                    { text: "↩️ 掉头返回", next: "entrance", effects: { sanity: -5 } }

            },
            miner: {
                text: "你看到一个佝偻的身影在黑暗中挖掘，他穿着几十年前的矿工服。听到你的脚步声，他缓缓转过头——那是一张骷髅般的面孔！",

                    { text: "⚔️ 用镐子攻击", next: "attackMiner", effects: {}, requiresItem: "生锈的镐子" },

                    { text: "继续", next: "deepMine", effects: { hp: -10 } }

            calmMiner: {
                text: "镇定剂让矿工幽灵平静了下来，他指着前方的一个方向，然后缓缓消失了。",
                choices: [
                    { text: "朝他指的方向走", next: "treasure", effects: {} }
                ]
            },
            treasure: {
                text: "你发现了一个隐藏的矿室，里面堆积着一些发光的水晶。这些水晶散发着奇异的能量。",
                choices: [
                    { text: "💎 收集水晶", next: "win", effects: {} }
                ]
            },
            win: {
                text: "⭐ 恭喜！你成功从废弃矿井中活着出来了，还收获了能量水晶！",
                choices: [],
                isWin: true,
                winMessage: "你获得了 35 理智碎片和能量水晶！"
            }
        };

        // 血月教堂副本剧情
        const churchStory = {
            start: {
                text: "血月悬在教堂尖顶上方，将一切都染成了暗红色。教堂的大门敞开，里面传来管风琴的乐声。彩绘玻璃上映着扭曲的影子...",
                choices: [
                    { text: "🚪 进入教堂", next: "enterChurch", effects: {} },
                    { text: "🔍 在教堂外观察", next: "outside", effects: {} }
                ]
            },
            outside: {
                text: "你绕着教堂走了一圈，发现后院有一片墓地。其中一座墓碑上刻着你的名字和今天的日期！",
                choices: [
                    { text: "😨 冲进教堂", next: "enterChurch", effects: { sanity: -20 } },
                    { text: "🧘 告诉自己这是幻觉", next: "calmChurch", effects: { sanity: -5 } }
                ]
            },
            calmChurch: {
                text: "你深呼吸，再次看向墓碑——上面什么都没有。是幻觉吗？",
                choices: [
                    { text: "进入教堂", next: "enterChurch", effects: {} }
                ]
            },
            enterChurch: {
                text: "教堂内部比外面看起来大得多。长椅上空无一人，但管风琴在自动演奏。祭坛上方有一个巨大的血色十字架。",
                choices: [
                    { text: "🙏 走向祭坛", next: "altar", effects: {} },
                    { text: "🎭 检查管风琴", next: "organ", effects: {} },
                    { text: "🔍 检查忏悔室", next: "confession", effects: {} }
                ]
            },
            altar: {
                text: "祭坛上放着一本古老的圣经，页面自动翻开到启示录章节。突然，圣经上开始渗出鲜血！",
                choices: [
                    { text: "📿 用十字架镇压", next: "exorcise", effects: {}, requiresItem: "生锈的十字架" },
                    { text: "🏃 逃离教堂", next: "runChurch", effects: { sanity: -20 } },
                    { text: "💪 强行合上圣经", next: "closeBook", effects: { hp: -15, sanity: -15 } }
                ]
            },
            exorcise: {
                text: "你高举十字架，神圣的光芒驱散了黑暗。教堂恢复了平静，血月也变成了正常的月亮。",
                choices: [
                    { text: "✅ 通关", next: "win", effects: {} }
                ]
            },
            runChurch: {
                text: "你跑出教堂，但教堂的门自动关上了，把你困在了院子里。",
                choices: [
                    { text: "回到教堂", next: "enterChurch", effects: {} }
                ]
            },
            closeBook: {
                text: "你用力合上了圣经，但手被烫伤了。教堂开始颤抖。",
                choices: [
                    { text: "继续", next: "runChurch", effects: {} }
                ]
            },
            organ: {
                text: "你走到管风琴前，琴键在自己跳动。你听到了一个声音：'演奏一首赞美诗，我就可以安息...'",
                choices: [
                    { text: "🎹 尝试演奏", next: "playOrgan", effects: {} },
                    { text: "🔍 继续检查", next: "enterChurch", effects: {} }
                ]
            },
            playOrgan: {
                text: "你坐在琴前，手指触摸到琴键的一瞬间，一段陌生的旋律自动从你手中流出。当最后一个音符落下时，管风琴停止了自动演奏，教堂恢复了平静。",
                choices: [
                    { text: "✅ 通关", next: "win", effects: {} }
                ]
            },
            confession: {
                text: "你走进忏悔室，坐下后，隔板另一侧传来一个声音：'说出你的罪孽...'",
                choices: [
                    { text: "🗣️ 忏悔", next: "confess", effects: {} },
                    { text: "🚪 离开", next: "enterChurch", effects: {} }
                ]
            },
            confess: {
                text: "你坦诚地面对自己的恐惧。忏悔室的门打开后，你发现教堂已经恢复了正常。",
                choices: [
                    { text: "✅ 通关", next: "win", effects: {} }
                ]
            },
            win: {
                text: "⭐ 恭喜！你净化了血月教堂，获得了神圣祝福！",
                choices: [],
                isWin: true,
                winMessage: "你获得了 50 理智碎片和圣光护符！"
            }
        };

        // 副本映射
        const stories = {
            '幽灵邮轮': cruiseStory,
            '迷雾森林': forestStory,
            '废弃矿井': mineStory,
            '血月教堂': churchStory
        };

        // ========== 游戏状态 ==========
        let currentDungeon = null;
        let currentStory = null;
        let currentNode = null;
        let currentNodeId = 'start';
        let hp = 100;
        let sanity = 100;
        let gameActive = true;
        let gameWin = false;
        let gameDeath = false;

        // 更新UI显示
        function updateStats() {
            document.getElementById('hpValue').textContent = Math.max(0, hp);
            document.getElementById('sanityValue').textContent = Math.max(0, sanity);
            let shards = localStorage.getItem('sanityShards');
            if (shards === null) shards = 100;
            document.getElementById('shardsValue').textContent = shards;
        }

        // 应用效果
        function applyEffects(effects) {
            if (effects.hp) {
                hp += effects.hp;
                if (hp <= 0) {
                    hp = 0;
                    gameActive = false;
                    gameDeath = true;
                }
            }
            if (effects.sanity) {
                sanity += effects.sanity;
                if (sanity <= 0) {
                    sanity = 0;
                    gameActive = false;
                    gameDeath = true;
                }
            }
            if (effects.hp && effects.hp > 0) {
                addEventLog(`生命恢复了 ${effects.hp}`);
            } else if (effects.hp && effects.hp < 0) {
                addEventLog(`生命损失了 ${Math.abs(effects.hp)}`);
            }
            if (effects.sanity && effects.sanity > 0) {
                addEventLog(`理智恢复了 ${effects.sanity}`);
            } else if (effects.sanity && effects.sanity < 0) {
                addEventLog(`理智损失了 ${Math.abs(effects.sanity)}`);
            }
            updateStats();
        }

        // 添加事件记录
        function addEventLog(message) {
            let eventLog = JSON.parse(localStorage.getItem('eventLog') || '[]');
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            eventLog.unshift({ time: timeStr, message: message });
            if (eventLog.length > 50) eventLog.pop();
            localStorage.setItem('eventLog', JSON.stringify(eventLog));
        }

        // 更新统计（通关/死亡次数）
        function updateStatsCount(isWin, isDeath, dungeonName) {
            let stats = JSON.parse(localStorage.getItem('playerStats') || '{"wins":0,"deaths":0,"completedDungeons":[]}');
            if (isWin) {
                stats.wins++;
                if (!stats.completedDungeons.includes(dungeonName)) {
                    stats.completedDungeons.push(dungeonName);
                }
                addEventLog(`成功通关了「${dungeonName}」！`);
            }
            if (isDeath) {
                stats.deaths++;
                addEventLog(`在「${dungeonName}」中死亡了...`);
            }
            localStorage.setItem('playerStats', JSON.stringify(stats));
        }

        // 发放奖励
        function giveReward(winMessage) {
            let shards = parseInt(localStorage.getItem('sanityShards') || '100');
            let rewardShards = 0;
            if (currentDungeon.name === '幽灵邮轮') rewardShards = 30;
            else if (currentDungeon.name === '迷雾森林') rewardShards = 25;
            else if (currentDungeon.name === '废弃矿井') rewardShards = 35;
            else if (currentDungeon.name === '血月教堂') rewardShards = 50;
            
            shards += rewardShards;
            localStorage.setItem('sanityShards', shards);
            updateStats();
            
            // 随机获得道具
            let backpack = JSON.parse(localStorage.getItem('backpack') || '[]');
            const rewards = [
                { name: '镇定剂', icon: '💊', desc: '恢复10理智碎片' },
                { name: '手摇手电筒', icon: '🔦', desc: '照亮黑暗' }
            ];
            const reward = rewards[Math.floor(Math.random() * rewards.length)];
            backpack.push(reward);
            localStorage.setItem('backpack', JSON.stringify(backpack));
            
            alert(`通关奖励！\n获得 ${rewardShards} 理智碎片\n获得 ${reward.name}`);
            addEventLog(`通关「${currentDungeon.name}」获得 ${rewardShards} 理智碎片和 ${reward.name}`);
        }

        // 处理死亡
        function handleDeath(deathMessage) {
            addEventLog(deathMessage || '你在副本中死亡了...');
            updateStatsCount(false, true, currentDungeon.name);
            document.getElementById('storyText').innerHTML = `<span style="color:#ff6b6b;">💀 GAME OVER 💀</span><br><br>${deathMessage || '你没能逃出这个副本...'}`;
            document.getElementById('choiceButtons').innerHTML = '';
            document.getElementById('useItemArea').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            gameActive = false;
        }

        // 处理通关
        function handleWin(winMessage) {
            giveReward(winMessage);
            updateStatsCount(true, false, currentDungeon.name);
            document.getElementById('storyText').innerHTML = `<span style="color:#7ec850;">⭐ 副本通关 ⭐</span><br><br>${winMessage}`;
            document.getElementById('choiceButtons').innerHTML = '';
            document.getElementById('useItemArea').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            gameActive = false;
            gameWin = true;
        }

        // 渲染当前节点
        function renderNode(nodeId) {
            if (!gameActive) return;
            
            const node = currentStory[nodeId];
            if (!node) {
                console.error('节点不存在:', nodeId);
                return;
            }
            
            currentNodeId = nodeId;
            
            // 检查通关/死亡
            if (node.isWin) {
                handleWin(node.winMessage || '副本通关！');
                return;
            }
            if (node.isDeath) {
                handleDeath(node.deathMessage || '你没能逃出这个副本...');
                return;
            }
            
            // 检查生命/理智是否归零
            if (hp <= 0) {
                handleDeath('你的生命值归零，倒在了副本中...');
                return;
            }
            if (sanity <= 0) {
                handleDeath('你的理智彻底崩溃，永远困在了这个副本里...');
                return;
            }
            
            // 显示故事文本
            document.getElementById('storyText').innerHTML = node.text;
            
            // 生成选项按钮
            if (node.choices && node.choices.length > 0) {
                const choicesHtml = node.choices.map((choice, idx) => {
                    let requirementText = '';
                    if (choice.requiresItem) {
                        requirementText = ` (需要：${choice.requiresItem})`;
                    }
                    return `<button class="choice-btn" data-choice-index="${idx}">${choice.text}${requirementText}</button>`;
                }).join('');
                document.getElementById('choiceButtons').innerHTML = choicesHtml;
                
                // 绑定选项事件
                document.querySelectorAll('.choice-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(btn.getAttribute('data-choice-index'));
                        const choice = node.choices[idx];
                        if (!choice) return;
                        
                        // 检查道具需求
                        if (choice.requiresItem) {
                            const backpack = JSON.parse(localStorage.getItem('backpack') || '[]');
                            const hasItem = backpack.some(item => item.name === choice.requiresItem);
                            if (!hasItem) {
                                alert(`需要 ${choice.requiresItem} 才能选择这个选项！`);
                                return;
                            }
                        }
                        
                        // 应用效果
                        if (choice.effects) {
                            applyEffects(choice.effects);
                        }
                        
                        // 跳转到下一节点
                        if (choice.next) {
                            renderNode(choice.next);
                        }
                    });
                });
            } else {
                document.getElementById('choiceButtons').innerHTML = '<p style="color:#7a5a4a; text-align:center;">剧情结束，请重置副本</p>';
            }
            
            // 显示可使用道具的区域
            updateItemButtons();
        }
        
        // 更新道具按钮
        function updateItemButtons() {
            const backpack = JSON.parse(localStorage.getItem('backpack') || '[]');
            if (backpack.length === 0) {
                document.getElementById('useItemArea').style.display = 'none';
                return;
            }
            
            document.getElementById('useItemArea').style.display = 'block';
            const itemButtonsHtml = backpack.map((item, idx) => {
                return `<button class="item-btn" data-item-index="${idx}" data-item-name="${item.name}">${item.icon || '📦'} ${item.name}</button>`;
            }).join('');
            document.getElementById('itemButtons').innerHTML = itemButtonsHtml;
            
            document.querySelectorAll('.item-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const itemName = btn.getAttribute('data-item-name');
                    useItemInDungeon(itemName);
                });
            });
        }
        
        // 在副本中使用道具
        function useItemInDungeon(itemName) {
            let backpack = JSON.parse(localStorage.getItem('backpack') || '[]');
            const itemIndex = backpack.findIndex(item => item.name === itemName);
            if (itemIndex === -1) return;
            
            let used = false;
            let effectMessage = '';
            
            if (itemName === '镇定剂') {
                hp = Math.min(100, hp + 20);
                sanity = Math.min(100, sanity + 15);
                effectMessage = '使用镇定剂，生命+20，理智+15';
                used = true;
            } else if (itemName === '手摇手电筒') {
                sanity = Math.min(100, sanity + 10);
                effectMessage = '手电筒照亮了黑暗，理智+10';
                used = true;
            } else if (itemName === '生锈的十字架') {
                sanity = Math.min(100, sanity + 15);
                effectMessage = '十字架发出微弱光芒，理智+15';
                used = true;
            } else if (itemName === '护身符') {
                hp = Math.min(100, hp + 10);
                effectMessage = '护身符保护了你，生命+10';
                used = true;
            } else {
                effectMessage = '这个道具在这个副本中没有效果';
            }
            
            if (used) {
                backpack.splice(itemIndex, 1);
                localStorage.setItem('backpack', JSON.stringify(backpack));
                addEventLog(effectMessage);
                updateStats();
                updateItemButtons();
                alert(effectMessage);
            } else {
                alert(effectMessage);
            }
        }

        // 重置副本
        function resetDungeon() {
            hp = 100;
            sanity = 100;
            gameActive = true;
            gameWin = false;
            gameDeath = false;
            currentNodeId = 'start';
            updateStats();
            renderNode('start');
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
        }

        // 初始化
        try {
            const saved = localStorage.getItem('currentDungeon');
            if (saved) {
                currentDungeon = JSON.parse(saved);
                document.getElementById('currentDungeonName').textContent = currentDungeon.name;
                currentStory = stories[currentDungeon.name];
                if (currentStory) {
                    renderNode('start');
                } else {
                    document.getElementById('storyText').innerHTML = '副本数据加载失败';
                }
            } else {
                document.getElementById('storyText').innerHTML = '请从副本列表选择副本';
            }
        } catch(e) {
            console.error('初始化失败:', e);
        }
        
        updateStats();
        document.getElementById('resetBtn').addEventListener('click', resetDungeon);
        
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.querySelectorAll('.status-time').forEach(el => {
                if (el) el.textContent = `🕸️ ${hours}:${minutes}:${seconds}`;
            });
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
