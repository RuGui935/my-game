<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>商城 - 无限回廊</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="status-bar">
                <span>⚠️ 信号丢失</span>
                <span>🕸️ 03:00</span>
                <span>🔋 诅咒</span>
            </div>
            <div class="player-info">
                <div class="player-avatar"></div>
                <div class="player-stats">
                    <div class="player-name">▶ 玩家「125」</div>
                    <div class="player-id">编号：011 | 理智值：43%</div>
                </div>
                <div class="settings-icon">⚙️</div>
            </div>
        </header>

        <main class="main-content">
            <div class="list-container">
                <h3 class="section-title">🕯️ 黑市商人</h3>
                <ul class="item-list">
                    <li><span>⚰️ 生锈的十字架</span><span class="price">15 理智碎片</span></li>
                    <li><span>🔦 手摇手电筒</span><span class="price">8 理智碎片</span></li>
                    <li><span>🪨 神秘符文石</span><span class="price">30 理智碎片</span></li>
                    <li><span>💊 镇定剂</span><span class="price">12 理智碎片</span></li>
                    <li><span>📿 护身符</span><span class="price">50 理智碎片</span></li>
                </ul>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item" data-page="forum">💬<span class="nav-label">论坛</span></div>
            <div class="nav-item" data-page="dungeon">📖<span class="nav-label">副本</span></div>
            <div class="nav-item" data-page="shop">🛒<span class="nav-label">商城</span></div>
            <div class="nav-item" data-page="lottery">🎁<span class="nav-label">奖池</span></div>
            <div class="nav-item" data-page="mail">✉️<span class="nav-label">邮箱</span></div>
            <div class="nav-item" data-page="friend">👥<span class="nav-label">好友</span></div>
        </nav>
    </div>
    <script src="../script.js"></script>
</body>
</html>
